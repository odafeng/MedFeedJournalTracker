name: Integration (live APIs)

on:
  # Every Monday at 03:00 UTC (11:00 Asia/Taipei)
  schedule:
    - cron: "0 3 * * 1"
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (no DB writes)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  pubmed-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: PubMed API smoke test
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
        run: |
          source .venv/bin/activate
          python - <<'EOF'
          from scrapers.pubmed_scraper import PubMedScraper
          import os
          s = PubMedScraper(api_key=os.getenv("PUBMED_API_KEY"))
          # Fetch one known journal — "Annals of Coloproctology"
          articles = s.fetch_articles(
              url="https://coloproctol.org/",
              journal_issn="2287-9722",
              journal_name="Annals of Coloproctology",
              days_back=30,
          )
          print(f"PubMed returned {len(articles)} articles (last 30 days)")
          assert isinstance(articles, list), "Expected list"
          print("✓ PubMed smoke test passed")
          EOF
