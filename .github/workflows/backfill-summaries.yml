name: Backfill Summaries

# Manually fill in missing Chinese summaries (summary_zh) for older articles so
# they become visible to the LINE query agent's Chinese free-text search.
# Run from the Actions tab -> "Backfill Summaries" -> "Run workflow".
#
# Consumes Anthropic API quota (one cheap Sonnet call per article).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles to process this run"
        required: false
        default: "100"
      all:
        description: "Loop until no articles are left (ignores limit as a cap)"
        type: boolean
        required: false
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'claude-sonnet-4-5-20250929' }}
          LOG_LEVEL: INFO
        run: |
          source .venv/bin/activate
          if [ "${{ inputs.all }}" = "true" ]; then
            python -m scripts.backfill_summaries --all --limit "${{ inputs.limit }}"
          else
            python -m scripts.backfill_summaries --limit "${{ inputs.limit }}"
          fi
