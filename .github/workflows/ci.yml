name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev, "feat/**"]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check --select E,F,I --exclude webhook_app --exclude webhook_service.py \
            config database llm notifier scrapers services sync tests main.py

      - name: Type check (mypy, lenient)
        run: |
          source .venv/bin/activate
          mypy --ignore-missing-imports --check-untyped-defs=false \
            config database llm notifier scrapers services sync main.py || true

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short
