name: Keep Query Agent Warm

# Render free web services spin down after ~15 min of inactivity, and the
# cold start takes 50s+ — long enough that LINE's webhook delivery times out
# and the user's message is dropped before Flask ever sees it (no reply, no log).
#
# This workflow pings /health every ~10 min so the instance never idles out,
# keeping the webhook hot. Override the URL with a repo variable named
# KEEPALIVE_URL if the service URL differs from the default below.
#
# NOTE: GitHub disables scheduled workflows after 60 days with no repo commits.
# A commit (or a manual re-enable in the Actions tab) is enough to revive it.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.KEEPALIVE_URL || 'https://medfeed-query-agent.onrender.com/health' }}"
          echo "Pinging $URL"
          # Retry a few times: the first hit may itself be the cold-start wake-up.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Service did not return 200 after retries"
          exit 1
