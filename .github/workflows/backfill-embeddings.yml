name: Backfill Embeddings

# Manually embed articles for semantic search. Run from the Actions tab.
# Requires the OPENAI_API_KEY secret. Cost is tiny (text-embedding-3-small).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles to embed (blank = all missing)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run embedding backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          source .venv/bin/activate
          if [ -n "${{ inputs.limit }}" ]; then
            python -m scripts.backfill_embeddings --limit "${{ inputs.limit }}"
          else
            python -m scripts.backfill_embeddings
          fi
