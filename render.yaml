services:
  # Daily cron: 06:00 Asia/Taipei (22:00 UTC previous day)
  - type: cron
    name: medfeed-journal-tracker-daily
    env: python
    plan: free
    schedule: "0 22 * * *"
    buildCommand: |
      pip install --upgrade pip uv
      uv pip install --system -e .
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      # Telegram
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # Anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-sonnet-4-5-20250929
      # OpenAI embeddings (enables semantic search; optional)
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_DAILY_BUDGET
        value: "50"
      # PubMed
      - key: PUBMED_API_KEY
        sync: false
      # Notion
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      # Runtime
      - key: LOG_LEVEL
        value: INFO
      - key: DAYS_BACK
        value: "7"

  # Web service: LINE Query Agent (24/7)
  - type: web
    name: medfeed-query-agent
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip uv
      uv pip install --system -e .
    # --workers 1 is intentional: the webhook keeps rate-limit, conversation
    # memory and the agent singleton in-process. Scaling to >1 worker would need
    # a shared store (e.g. Redis) first.
    startCommand: gunicorn agents.webhook:app --bind 0.0.0.0:$PORT --timeout 120 --preload --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      # Enables X-Line-Signature verification (blocks anonymous webhook abuse).
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # OpenAI embeddings — enables semantic search in the query agent (optional).
      - key: OPENAI_API_KEY
        sync: false
      # Model for the NL->SQL query agent (defaults to claude-sonnet-4-6).
      - key: QUERY_LLM_MODEL
        value: claude-sonnet-4-6
      # Set to "true" to only answer users in the subscribers table.
      - key: LINE_RESTRICT_TO_SUBSCRIBERS
        value: "false"
